name: CI-Build-and-Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/guestbook:v0.0.${{ github.run_number }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: ValentinIgoufe/gitops
          token: ${{ secrets.GITOPS_TOKEN }}   

      - name: Update Image Tag
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/guestbook:v0.0.${{ github.run_number }}|g" apps/guestbook/frontend/deployment.yaml
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/guestbook:v0.0.${{ github.run_number }}|g" apps/guestbook/backend/deployment.yaml

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update image to v0.0.${{ github.run_number }}"
          git push